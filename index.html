<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Katalog Talent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #17181c;
    --card: #1f2126;
    --border: #2c2f36;
    --text: #f2f2f2;
    --muted: #9a9da6;
    --accent: #7c5cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .header {
    margin-bottom: 16px;
  }
  .header .title {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .header .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin: 0;
    line-height: 1.5;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .talent-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }
  .talent-card:active { opacity: 0.85; }
  .talent-photo {
    width: 100%;
    aspect-ratio: 3 / 4;
    object-fit: cover;
    background: var(--border);
  }
  .talent-photo.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .talent-info {
    padding: 10px 12px 12px;
  }
  .talent-name {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .talent-desc {
    font-size: 12.5px;
    color: var(--muted);
    margin: 0;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .state-msg {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 0;
  }
</style>
</head>
<body>

<div class="header">
  <p class="title">💃 Katalog Talent</p>
  <p class="subtitle">Ketuk salah satu talent untuk lihat detail, pricelist, dan cek ketersediaan.</p>
</div>

<div id="grid" class="grid" style="display:none;"></div>
<div id="state" class="state-msg">Memuat katalog talent…</div>

<script>
  // GANTI URL DI BAWAH INI dengan domain publik bot kamu (Railway), contoh:
  // "https://nama-service-kamu.up.railway.app"
  const API_BASE_URL = "https://GANTI_DENGAN_DOMAIN_RAILWAY_KAMU.up.railway.app";

  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  function showState(msg) {
    const stateEl = document.getElementById("state");
    stateEl.style.display = "block";
    stateEl.textContent = msg;
  }

  async function loadTalents() {
    const grid = document.getElementById("grid");

    try {
      const res = await fetch(API_BASE_URL.replace(/\/$/, "") + "/api/talents");
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const talents = data.talents || [];

      if (talents.length === 0) {
        showState("Belum ada talent yang tersedia.");
        return;
      }

      grid.innerHTML = "";
      talents.forEach((t) => {
        const card = document.createElement("div");
        card.className = "talent-card";
        card.onclick = () => selectTalent(t.id);

        let photoEl;
        if (t.photo_url) {
          photoEl = document.createElement("img");
          photoEl.className = "talent-photo";
          photoEl.src = t.photo_url;
          photoEl.loading = "lazy";
        } else {
          photoEl = document.createElement("div");
          photoEl.className = "talent-photo placeholder";
          photoEl.textContent = "👤";
        }

        const info = document.createElement("div");
        info.className = "talent-info";

        const name = document.createElement("p");
        name.className = "talent-name";
        name.textContent = t.name;

        const desc = document.createElement("p");
        desc.className = "talent-desc";
        desc.textContent = t.description || "";

        info.appendChild(name);
        info.appendChild(desc);
        card.appendChild(photoEl);
        card.appendChild(info);
        grid.appendChild(card);
      });

      grid.style.display = "grid";
      document.getElementById("state").style.display = "none";
    } catch (err) {
      showState("Gagal memuat katalog. Coba buka lagi sebentar lagi.");
    }
  }

  async function selectTalent(talentId) {
    if (!tg) {
      showState("Halaman ini harus dibuka lewat tombol di bot Telegram.");
      return;
    }

    // Mini App dibuka lewat Menu Button/inline -> ada query_id di initData.
    // Jalur ini TIDAK BISA pakai sendData(), jadi kirim ke backend kita
    // sendiri, yang nanti memanggil answerWebAppQuery ke Telegram.
    const queryId = tg.initDataUnsafe && tg.initDataUnsafe.query_id;

    if (queryId) {
      try {
        const res = await fetch(API_BASE_URL.replace(/\/$/, "") + "/api/select-talent", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query_id: queryId, talent_id: talentId }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || ("HTTP " + res.status));
        tg.close();
      } catch (err) {
        showState("Gagal memproses pilihan: " + err.message);
      }
      return;
    }

    // Kalau bukan lewat Menu Button, coba jalur reply keyboard (sendData).
    if (typeof tg.sendData !== "function") {
      showState("Mini App ini dibuka dengan cara yang tidak didukung. Coba buka lewat tombol katalog di chat bot.");
      return;
    }

    try {
      tg.sendData(JSON.stringify({ talent_id: talentId }));
      tg.close();
    } catch (err) {
      showState("Gagal mengirim pilihan ke bot: " + err.message);
    }
  }

  loadTalents();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Katalog Talent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14121a;
    --bg-elevated: #1e1b26;
    --gold: #d9a441;
    --gold-soft: #e8c579;
    --text: #f3efe6;
    --text-dim: #a89ecb;
    --border: #302b3d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body { padding-bottom: 32px; }

  .topbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
  }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    margin: 0;
    letter-spacing: 0.2px;
  }
  .topbar .eyebrow {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 2px;
  }

  .sound-toggle {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 14px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .eq {
    display: flex; align-items: flex-end; gap: 2px; height: 14px;
  }
  .eq span {
    width: 3px; background: var(--gold); border-radius: 2px;
    animation: bounce 0.9s ease-in-out infinite;
  }
  .eq span:nth-child(1) { height: 40%; animation-delay: 0s; }
  .eq span:nth-child(2) { height: 100%; animation-delay: 0.15s; }
  .eq span:nth-child(3) { height: 65%; animation-delay: 0.3s; }
  .sound-toggle.muted .eq span { animation-play-state: paused; height: 20% !important; opacity: 0.4; }
  @keyframes bounce {
    0%, 100% { height: 25%; }
    50% { height: 100%; }
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 4px 20px 20px;
  }
  @media (min-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:active { transform: scale(0.97); border-color: var(--gold); }

  .card .photo {
    width: 100%; aspect-ratio: 3/4;
    background: #26212f center/cover no-repeat;
    display: flex; align-items: flex-end;
    position: relative;
  }
  .card .photo::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(20,18,26,0.9) 100%);
  }
  .card .photo .no-photo {
    width: 100%; text-align: center;
    font-family: 'Fraunces', serif; font-size: 32px;
    color: var(--gold-soft); opacity: 0.5;
    align-self: center;
  }

  .card .info {
    padding: 10px 12px 12px;
  }
  .card .name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    margin: 0 0 4px;
    color: var(--text);
  }
  .card .desc {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .empty, .error {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .empty .icon, .error .icon { font-size: 32px; margin-bottom: 10px; }

  .skeleton {
    background: linear-gradient(90deg, var(--bg-elevated) 25%, #262131 37%, var(--bg-elevated) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 14px;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <p class="eyebrow">Talent &amp; Model</p>
    <h1>Pilih Talent</h1>
  </div>
  <button class="sound-toggle muted" id="soundToggle" type="button">
    <span class="eq"><span></span><span></span><span></span></span>
    <span id="soundLabel">Bunyi</span>
  </button>
</div>

<div class="grid" id="grid">
  <div class="skeleton" style="aspect-ratio:3/4"></div>
  <div class="skeleton" style="aspect-ratio:3/4"></div>
  <div class="skeleton" style="aspect-ratio:3/4"></div>
  <div class="skeleton" style="aspect-ratio:3/4"></div>
</div>

<audio id="bgm" loop preload="auto" playsinline webkit-playsinline>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
  // Ganti dengan domain tempat api_server.py di-deploy (mis. https://nama-app.up.railway.app)
  const API_BASE_URL = "https://worker-production-6bb7.up.railway.app";

  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // ---------- Musik background, volume 50% ----------
  const bgm = document.getElementById("bgm");
  const soundToggle = document.getElementById("soundToggle");
  const soundLabel = document.getElementById("soundLabel");
  bgm.volume = 0.5;
  let userEnabledSound = false;
  let soundHasError = false;

  function setSoundUI(playing) {
    if (soundHasError) return;
    soundToggle.classList.toggle("muted", !playing);
    soundLabel.textContent = playing ? "Musik" : "Bunyi";
  }

  // Kalau bgm.mp3 tidak ketemu (404) atau format tidak didukung, tampilkan pesan ini
  // di tombolnya sendiri -- supaya kelihatan tanpa perlu buka DevTools.
  bgm.addEventListener("error", () => {
    soundHasError = true;
    soundLabel.textContent = "Musik gagal dimuat";
    soundToggle.classList.add("muted");
  });

  // Coba autoplay ter-mute dulu (ini diizinkan browser tanpa interaksi user)
  bgm.muted = true;
  bgm.play().catch(() => {});

  function enableSound() {
    if (soundHasError) return;
    bgm.muted = false;
    bgm.volume = 0.5;
    const playPromise = bgm.play();
    if (playPromise && playPromise.then) {
      playPromise
        .then(() => {
          userEnabledSound = true;
          setSoundUI(true);
        })
        .catch(() => {
          // Masih diblokir browser di gesture ini -- biarkan mute, coba lagi di tap berikutnya
          bgm.muted = true;
        });
    } else {
      userEnabledSound = true;
      setSoundUI(true);
    }
  }

  function disableSound() {
    bgm.muted = true;
    userEnabledSound = false;
    setSoundUI(false);
  }

  soundToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    if (userEnabledSound) disableSound();
    else enableSound();
  });

  // Coba nyalakan musik di gesture pertama apa pun di layar (tap/klik/sentuh).
  // Dipasang di beberapa jenis event karena WebView Telegram di sebagian perangkat
  // hanya mengenali salah satu dari ini sebagai "user gesture" yang sah untuk audio.
  ["click", "touchend", "pointerdown"].forEach(evt => {
    document.body.addEventListener(evt, () => {
      if (!userEnabledSound) enableSound();
    }, { capture: true, passive: true });
  });

  // ---------- Katalog talent ----------
  const grid = document.getElementById("grid");

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function renderTalents(talents) {
    if (!talents.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="icon">📭</div>
        Belum ada talent yang tersedia saat ini.
      </div>`;
      return;
    }
    grid.innerHTML = talents.map(t => `
      <div class="card" data-id="${t.id}">
        <div class="photo" style="${t.photo_url ? `background-image:url('${API_BASE_URL}${t.photo_url}')` : ""}">
          ${!t.photo_url ? `<div class="no-photo">✦</div>` : ""}
        </div>
        <div class="info">
          <p class="name">${escapeHtml(t.name)}</p>
          <p class="desc">${escapeHtml(t.description)}</p>
        </div>
      </div>
    `).join("");

    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        const talentId = card.getAttribute("data-id");
        if (tg) {
          tg.sendData(JSON.stringify({ action: "view_talent", talent_id: Number(talentId) }));
          tg.close();
        }
      });
    });
  }

  fetch(`${API_BASE_URL}/api/talents`)
    .then(res => {
      if (!res.ok) throw new Error("Gagal memuat data");
      return res.json();
    })
    .then(renderTalents)
    .catch(() => {
      grid.innerHTML = `<div class="error" style="grid-column:1/-1">
        <div class="icon">⚠️</div>
        Tidak bisa memuat katalog. Pastikan API_BASE_URL di index.html sudah diisi domain yang benar.
      </div>`;
    });
</script>
</body>
</html>

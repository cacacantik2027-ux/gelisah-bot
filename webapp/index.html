<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Katalog Talent</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14121a;
    --bg-elevated: #1e1b26;
    --gold: #d9a441;
    --gold-soft: #e8c579;
    --text: #f3efe6;
    --text-dim: #a89ecb;
    --border: #302b3d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body { padding-bottom: 32px; }

  .topbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
    background: linear-gradient(180deg, var(--bg) 70%, transparent);
  }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    margin: 0;
    letter-spacing: 0.2px;
  }
  .topbar .eyebrow {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 2px;
  }

  .sound-toggle {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 9px 14px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .eq {
    display: flex; align-items: flex-end; gap: 2px; height: 14px;
  }
  .eq span {
    width: 3px; background: var(--gold); border-radius: 2px;
    animation: bounce 0.9s ease-in-out infinite;
  }
  .eq span:nth-child(1) { height: 40%; animation-delay: 0s; }
  .eq span:nth-child(2) { height: 100%; animation-delay: 0.15s; }
  .eq span:nth-child(3) { height: 65%; animation-delay: 0.3s; }
  .sound-toggle.muted .eq span { animation-play-state: paused; height: 20% !important; opacity: 0.4; }
  @keyframes bounce {
    0%, 100% { height: 25%; }
    50% { height: 100%; }
  }

  .page { min-height: 100vh; }

  /* ---------- Transisi perpindahan halaman (Utama <-> Daftar Talent) ---------- */
  .page-exit-left {
    animation: pageExitLeft 0.32s cubic-bezier(.4,0,.2,1) forwards;
  }
  .page-exit-right {
    animation: pageExitRight 0.32s cubic-bezier(.4,0,.2,1) forwards;
  }
  .page-enter-right {
    animation: pageEnterRight 0.42s cubic-bezier(.16,1,.3,1) forwards;
  }
  .page-enter-left {
    animation: pageEnterLeft 0.42s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes pageEnterRight {
    from { opacity: 0; transform: translateX(28px) scale(0.97); filter: blur(8px); }
    to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
  }
  @keyframes pageExitLeft {
    from { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    to   { opacity: 0; transform: translateX(-28px) scale(0.97); filter: blur(8px); }
  }
  @keyframes pageEnterLeft {
    from { opacity: 0; transform: translateX(-28px) scale(0.97); filter: blur(8px); }
    to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
  }
  @keyframes pageExitRight {
    from { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    to   { opacity: 0; transform: translateX(28px) scale(0.97); filter: blur(8px); }
  }

  .topbar-catalog { justify-content: flex-start; gap: 14px; }

  .back-btn {
    flex: 0 0 auto;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--bg-elevated); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .back-btn:active { border-color: var(--gold); }

  .hero-photo {
    width: 100%; aspect-ratio: 16/9;
    background: #26212f center/cover no-repeat;
    position: relative;
  }
  .hero-photo::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 55%, var(--bg) 100%);
  }

  .home-body { padding: 6px 20px 28px; }
  .home-greeting {
    font-size: 14.5px; line-height: 1.65; color: var(--text-dim);
    white-space: pre-wrap; margin: 4px 0 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    background: var(--bg-elevated);
  }
  .stat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 14px;
    font-size: 12.5px; color: var(--text-dim);
    margin: 0 0 22px;
  }
  .stat-badge b { color: var(--gold); font-size: 14.5px; }

  .home-cta { width: 100%; }

  .floating-sponsor-marquee {
    margin: 18px 0 6px;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
  }
  .marquee-track {
    display: flex; align-items: flex-start; gap: 20px;
    width: max-content;
    animation: marquee-drift 26s linear infinite;
  }
  .floating-sponsor-marquee:active .marquee-track { animation-play-state: paused; }
  @keyframes marquee-drift {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-item {
    flex: 0 0 auto; width: 60px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .marquee-photo {
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--bg-elevated) center/cover no-repeat;
    border: 1px solid var(--border);
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }
  .marquee-name {
    width: 100%; font-size: 10.5px; color: var(--text-dim); text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0;
  }

  .channel-row { display: flex; gap: 12px; margin: 20px 0 24px; }
  .channel-card {
    flex: 1 1 0; min-width: 0;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .channel-photo {
    width: 100%; aspect-ratio: 4/3;
    background: #26212f center/cover no-repeat;
  }
  .channel-body { padding: 12px 12px 14px; }
  .channel-desc {
    font-size: 12px; line-height: 1.5; color: var(--text-dim);
    white-space: pre-wrap; margin: 0 0 10px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .channel-btn { width: 100%; padding: 9px 10px; font-size: 12.5px; }

  .sponsor-section { margin: 0 0 12px; }
  .sponsor-section .section-label {
    font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--gold); margin: 0 0 10px;
  }
  .sponsor-row {
    display: flex; gap: 12px; overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .sponsor-row::-webkit-scrollbar { display: none; }
  .sponsor-item {
    flex: 0 0 auto;
    width: 92px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .sponsor-photo {
    width: 92px; height: 92px;
    border-radius: 12px;
    background: var(--bg-elevated) center/cover no-repeat;
    border: 1px solid var(--border);
  }
  .sponsor-name {
    width: 100%;
    font-size: 11.5px; color: var(--text-dim); text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin: 0;
  }
  .sponsor-item.no-link { cursor: default; }

  .dev-fab {
    position: fixed; right: 18px; bottom: 22px; z-index: 50;
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, #3fb0ee, #1c8ad1);
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(28, 138, 209, 0.45);
    text-decoration: none;
  }
  .dev-fab svg { width: 26px; height: 26px; }
  .dev-fab:active { transform: scale(0.94); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 4px 20px 20px;
  }
  @media (min-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:active { transform: scale(0.97); border-color: var(--gold); }

  .card .photo {
    width: 100%; aspect-ratio: 3/4;
    background: #26212f center/cover no-repeat;
    display: flex; align-items: flex-end;
    position: relative;
  }
  .card .photo::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(20,18,26,0.9) 100%);
  }
  .card .photo .no-photo {
    width: 100%; text-align: center;
    font-family: 'Fraunces', serif; font-size: 32px;
    color: var(--gold-soft); opacity: 0.5;
    align-self: center;
  }

  .card .info {
    padding: 10px 12px 12px;
  }
  .card .name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15px;
    margin: 0 0 4px;
    color: var(--text);
  }
  .card .desc {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .empty, .error {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .empty .icon, .error .icon { font-size: 32px; margin-bottom: 10px; }

  .skeleton {
    background: linear-gradient(90deg, var(--bg-elevated) 25%, #262131 37%, var(--bg-elevated) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 14px;
  }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* ---------- Modal detail talent & sponsor ---------- */
  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10, 9, 14, 0.72);
    display: flex;
    align-items: flex-end;
    backdrop-filter: blur(0px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.32s cubic-bezier(.4,0,.2,1), backdrop-filter 0.32s cubic-bezier(.4,0,.2,1), visibility 0.32s;
  }
  .overlay.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    backdrop-filter: blur(6px);
  }

  .sheet {
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding-bottom: 24px;
    transform: translateY(36px) scale(0.97);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(.16,1,.3,1), opacity 0.32s cubic-bezier(.4,0,.2,1);
  }
  .overlay.open .sheet {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .sheet .close-row {
    display: flex; justify-content: flex-end;
    padding: 12px 14px 0;
  }
  .sheet .close-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-elevated); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  .sheet .detail-photo {
    width: 100%; aspect-ratio: 4/3;
    background: #26212f center/cover no-repeat;
    margin-top: 6px;
  }
  .sheet .detail-body { padding: 18px 20px 4px; }
  .sheet .detail-name {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 21px; margin: 0 0 8px; color: var(--text);
  }
  .sheet .detail-desc {
    font-size: 13.5px; line-height: 1.55; color: var(--text-dim);
    margin: 0 0 18px; white-space: pre-wrap;
  }

  .sheet .section-label {
    font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--gold); margin: 0 0 8px;
  }
  .sheet .pricelist-box {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13.5px; line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    margin: 0 0 20px;
  }

  .sheet .actions { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; }
  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    color: #1c1710; border: none;
  }
  .btn-outline { background: transparent; color: var(--text); }
</style>
</head>
<body>

<!-- ============ HALAMAN UTAMA ============ -->
<div class="page" id="pageHome">
  <div class="topbar">
    <div>
      <p class="eyebrow">Talent Spade &amp; Gelisah</p>
      <h1 id="homeTitle">Official Gelisah</h1>
    </div>
    <button class="sound-toggle muted" id="soundToggle" type="button">
      <span class="eq"><span></span><span></span><span></span></span>
      <span id="soundLabel">Bunyi</span>
    </button>
  </div>

  <div class="hero-photo" id="heroPhoto" style="display:none"></div>

  <div class="home-body">
    <p class="home-greeting" id="homeGreeting">Memuat sapaan...</p>
    <div class="stat-badge" id="statBadge" style="display:none">
      ✦ <b id="statCount">0</b> Talent Tersedia
    </div>
    <button class="btn btn-gold home-cta" id="goCatalogBtn" type="button">💃 Pilih Talent</button>

    <div class="floating-sponsor-marquee" id="floatingSponsorMarquee" style="display:none">
      <div class="marquee-track" id="marqueeTrack"></div>
    </div>

    <div class="channel-row">
      <div class="channel-card" id="channelCard" style="display:none">
        <div class="channel-photo" id="channelPhoto" style="display:none"></div>
        <div class="channel-body">
          <p class="channel-desc" id="channelDesc"></p>
          <a class="btn btn-outline channel-btn" id="channelVisitBtn" href="#" target="_blank" style="display:none; text-decoration:none;">📢 Kunjungi Channel</a>
        </div>
      </div>

      <div class="channel-card" id="channelCard2" style="display:none">
        <div class="channel-photo" id="channelPhoto2" style="display:none"></div>
        <div class="channel-body">
          <p class="channel-desc" id="channelDesc2"></p>
          <a class="btn btn-outline channel-btn" id="channelVisitBtn2" href="#" target="_blank" style="display:none; text-decoration:none;">📢 Kunjungi Channel</a>
        </div>
      </div>
    </div>

    <div class="sponsor-section" id="sponsorSection" style="display:none">
      <p class="section-label">✦ Sponsor</p>
      <div class="sponsor-row" id="sponsorRow"></div>
    </div>
  </div>
</div>

<!-- ============ HALAMAN DAFTAR TALENT ============ -->
<div class="page" id="pageCatalog" style="display:none">
  <div class="topbar topbar-catalog">
    <button class="back-btn" id="backHomeBtn" type="button">⬅️</button>
    <div>
      <p class="eyebrow">Talent Spade &amp; Gelisah</p>
      <h1>Pilih Talent</h1>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="skeleton" style="aspect-ratio:3/4"></div>
    <div class="skeleton" style="aspect-ratio:3/4"></div>
    <div class="skeleton" style="aspect-ratio:3/4"></div>
    <div class="skeleton" style="aspect-ratio:3/4"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="close-row">
      <div class="close-btn" id="closeSheet">✕</div>
    </div>
    <div class="detail-photo" id="detailPhoto"></div>
    <div class="detail-body">
      <p class="detail-name" id="detailName"></p>
      <p class="detail-desc" id="detailDesc"></p>
      <p class="section-label">💰 Pricelist</p>
      <p class="pricelist-box" id="detailPricelist"></p>
    </div>
    <div class="actions">
      <button class="btn btn-gold" id="bookBtn" type="button">💬 Chat Sekarang</button>
      <a class="btn btn-outline" id="channelBtn" href="#" target="_blank" style="display:none; text-decoration:none;">📢 Lihat Channel Telegram</a>
    </div>
  </div>
</div>

<!-- ============ HALAMAN DETAIL SPONSOR ============ -->
<div class="overlay" id="sponsorOverlay">
  <div class="sheet" id="sponsorSheet">
    <div class="close-row">
      <div class="close-btn" id="closeSponsorSheet">✕</div>
    </div>
    <div class="detail-photo" id="sponsorDetailPhoto"></div>
    <div class="detail-body">
      <p class="detail-name" id="sponsorDetailName"></p>
      <p class="detail-desc" id="sponsorDetailDesc"></p>
    </div>
    <div class="actions">
      <a class="btn btn-gold" id="sponsorVisitBtn" href="#" target="_blank" style="display:none; text-decoration:none;">🚀 Daftar Sekarang</a>
    </div>
  </div>
</div>

<audio id="bgm" loop preload="auto" playsinline webkit-playsinline>
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<a class="dev-fab" id="devFab" href="#" target="_blank" title="Chat Developer">
  <svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
    <circle cx="120" cy="120" r="120" fill="none"/>
    <path fill="#ffffff" d="M180.5 63.5 156 178c-1.8 8.1-6.6 10.1-13.4 6.3l-37-27.3-17.9 17.2c-2 2-3.7 3.7-7.5 3.7l2.7-38 69-62.3c3-2.7-.6-4.2-4.7-1.5l-85.3 53.7-36.7-11.5c-8-2.5-8.1-8 1.7-11.9l143.5-55.3c6.6-2.5 12.4 1.6 10.4 12.4z"/>
  </svg>
</a>

<script>
  // Ganti dengan domain tempat api_server.py di-deploy (mis. https://nama-app.up.railway.app)
  const API_BASE_URL = "https://worker-production-6bb7.up.railway.app";

  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // ---------- Musik background, volume 50% ----------
  const bgm = document.getElementById("bgm");
  const soundToggle = document.getElementById("soundToggle");
  const soundLabel = document.getElementById("soundLabel");
  bgm.volume = 0.5;
  let userEnabledSound = false;
  let soundHasError = false;

  function setSoundUI(playing) {
    if (soundHasError) return;
    soundToggle.classList.toggle("muted", !playing);
    soundLabel.textContent = playing ? "Musik" : "Bunyi";
  }

  // Kalau bgm.mp3 tidak ketemu (404) atau format tidak didukung, tampilkan pesan ini
  // di tombolnya sendiri -- supaya kelihatan tanpa perlu buka DevTools.
  bgm.addEventListener("error", () => {
    soundHasError = true;
    soundLabel.textContent = "Musik gagal dimuat";
    soundToggle.classList.add("muted");
  });

  // Coba autoplay ter-mute dulu (ini diizinkan browser tanpa interaksi user)
  bgm.muted = true;
  bgm.play().catch(() => {});

  function enableSound() {
    if (soundHasError) return;
    bgm.muted = false;
    bgm.volume = 0.5;
    const playPromise = bgm.play();
    if (playPromise && playPromise.then) {
      playPromise
        .then(() => {
          userEnabledSound = true;
          setSoundUI(true);
        })
        .catch(() => {
          // Masih diblokir browser di gesture ini -- biarkan mute, coba lagi di tap berikutnya
          bgm.muted = true;
        });
    } else {
      userEnabledSound = true;
      setSoundUI(true);
    }
  }

  function disableSound() {
    bgm.muted = true;
    userEnabledSound = false;
    setSoundUI(false);
  }

  soundToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    if (userEnabledSound) disableSound();
    else enableSound();
  });

  // Coba nyalakan musik di gesture pertama apa pun di layar (tap/klik/sentuh).
  // Dipasang di beberapa jenis event karena WebView Telegram di sebagian perangkat
  // hanya mengenali salah satu dari ini sebagai "user gesture" yang sah untuk audio.
  ["click", "touchend", "pointerdown"].forEach(evt => {
    document.body.addEventListener(evt, () => {
      if (!userEnabledSound) enableSound();
    }, { capture: true, passive: true });
  });

  // ---------- Navigasi antar halaman (Utama <-> Daftar Talent) ----------
  const pageHome = document.getElementById("pageHome");
  const pageCatalog = document.getElementById("pageCatalog");
  const homeTitle = document.getElementById("homeTitle");
  const homeGreeting = document.getElementById("homeGreeting");
  const heroPhoto = document.getElementById("heroPhoto");
  const statBadge = document.getElementById("statBadge");
  const statCount = document.getElementById("statCount");
  const goCatalogBtn = document.getElementById("goCatalogBtn");
  const backHomeBtn = document.getElementById("backHomeBtn");
  const channelCard = document.getElementById("channelCard");
  const channelPhoto = document.getElementById("channelPhoto");
  const channelDesc = document.getElementById("channelDesc");
  const channelCard2 = document.getElementById("channelCard2");
  const channelPhoto2 = document.getElementById("channelPhoto2");
  const channelDesc2 = document.getElementById("channelDesc2");
  const floatingSponsorMarquee = document.getElementById("floatingSponsorMarquee");
  const marqueeTrack = document.getElementById("marqueeTrack");
  let floatingSponsorEnabled = false;
  const channelVisitBtn = document.getElementById("channelVisitBtn");
  const channelVisitBtn2 = document.getElementById("channelVisitBtn2");
  const sponsorSection = document.getElementById("sponsorSection");
  const sponsorRow = document.getElementById("sponsorRow");
  const devFab = document.getElementById("devFab");

  let currentView = "home";
  let talentsLoaded = false;
  let pageTransitioning = false;
  const PAGE_TRANSITION_MS = 320;

  function updateBackButton() {
    if (!tg || !tg.BackButton) return;
    if (overlay.classList.contains("open") || sponsorOverlay.classList.contains("open") || currentView === "catalog") {
      tg.BackButton.show();
    } else {
      tg.BackButton.hide();
    }
  }

  function handleBack() {
    if (sponsorOverlay.classList.contains("open")) {
      closeSponsorDetail();
      return;
    }
    if (overlay.classList.contains("open")) {
      closeDetail();
      return;
    }
    if (currentView === "catalog") {
      showHome();
    }
  }

  if (tg && tg.BackButton) tg.BackButton.onClick(handleBack);

  // Pindah dari `fromPage` ke `toPage` dengan animasi geser + fade + blur
  // singkat (fromPage geser keluar ke arah `dir`, toPage masuk dari arah
  // berlawanan) supaya perpindahan halaman terasa mulus, bukan "loncat".
  function transitionPages(fromPage, toPage, dir) {
    if (pageTransitioning) return;
    pageTransitioning = true;

    const exitClass = dir === "forward" ? "page-exit-left" : "page-exit-right";
    const enterClass = dir === "forward" ? "page-enter-right" : "page-enter-left";

    fromPage.classList.add(exitClass);

    window.setTimeout(() => {
      fromPage.style.display = "none";
      fromPage.classList.remove(exitClass);

      toPage.style.display = "";
      toPage.classList.add(enterClass);
      window.scrollTo(0, 0);

      window.setTimeout(() => {
        toPage.classList.remove(enterClass);
        pageTransitioning = false;
      }, PAGE_TRANSITION_MS + 100);
    }, PAGE_TRANSITION_MS);
  }

  function showHome() {
    if (currentView === "home") return;
    currentView = "home";
    transitionPages(pageCatalog, pageHome, "back");
    updateBackButton();
  }

  function showCatalog() {
    if (currentView === "catalog") return;
    currentView = "catalog";
    transitionPages(pageHome, pageCatalog, "forward");
    updateBackButton();
    if (!talentsLoaded) loadTalents();
  }

  goCatalogBtn.addEventListener("click", showCatalog);
  backHomeBtn.addEventListener("click", showHome);

  function loadHome() {
    fetch(`${API_BASE_URL}/api/home`)
      .then(res => {
        if (!res.ok) throw new Error("Gagal memuat data sapaan");
        return res.json();
      })
      .then(data => {
        // Judul "Official Gelisah" di halaman utama Mini App sengaja dibuat
        // statis (branding tetap), tidak lagi mengikuti nama bot supaya tidak
        // tertukar dengan {bot_name} yang dipakai di teks sapaan bot Telegram.
        homeGreeting.textContent = data.greeting || "";
        if (data.greeting_photo_url) {
          heroPhoto.style.backgroundImage = `url('${API_BASE_URL}${data.greeting_photo_url}')`;
          heroPhoto.style.display = "";
        }
        statCount.textContent = data.total_talent;
        statBadge.style.display = "inline-flex";
        if (data.background_photo_url) {
          document.body.style.backgroundImage =
            `linear-gradient(180deg, rgba(20,18,26,0.55), rgba(20,18,26,0.94)), url('${API_BASE_URL}${data.background_photo_url}')`;
        }

        // Kartu channel (foto, deskripsi, tombol kunjungi)
        if (data.channel_photo_url || data.channel_description || data.channel_url) {
          channelCard.style.display = "block";
          if (data.channel_photo_url) {
            channelPhoto.style.backgroundImage = `url('${API_BASE_URL}${data.channel_photo_url}')`;
            channelPhoto.style.display = "";
          }
          channelDesc.textContent = data.channel_description || "";
          channelDesc.style.display = data.channel_description ? "" : "none";
          if (data.channel_url) {
            channelVisitBtn.href = data.channel_url;
            channelVisitBtn.style.display = "flex";
          }
        }

        // Kartu channel/grup kedua (slot tambahan, opsional)
        if (data.channel2_photo_url || data.channel2_description || data.channel2_url) {
          channelCard2.style.display = "block";
          if (data.channel2_photo_url) {
            channelPhoto2.style.backgroundImage = `url('${API_BASE_URL}${data.channel2_photo_url}')`;
            channelPhoto2.style.display = "";
          }
          channelDesc2.textContent = data.channel2_description || "";
          channelDesc2.style.display = data.channel2_description ? "" : "none";
          if (data.channel2_url) {
            channelVisitBtn2.href = data.channel2_url;
            channelVisitBtn2.style.display = "flex";
          }
        }

        // Tombol logo Telegram mengambang -> chat developer
        if (data.developer_chat_url) {
          devFab.href = data.developer_chat_url;
          devFab.style.display = "flex";
        }

        floatingSponsorEnabled = !!data.floating_sponsor_enabled;
        loadSponsors();
      })
      .catch(() => {
        homeGreeting.textContent = "Tidak bisa memuat sapaan. Pastikan API_BASE_URL di index.html sudah diisi domain yang benar.";
        loadSponsors();
      });
  }

  function loadSponsors() {
    fetch(`${API_BASE_URL}/api/sponsors`)
      .then(res => {
        if (!res.ok) throw new Error("Gagal memuat sponsor");
        return res.json();
      })
      .then(sponsors => {
        if (!sponsors.length) return;
        sponsorSection.style.display = "block";
        sponsorsById = {};
        sponsors.forEach(s => { sponsorsById[s.id] = s; });
        sponsorRow.innerHTML = sponsors.map(s => `
          <div class="sponsor-item" data-id="${s.id}">
            <div class="sponsor-photo" style="${s.photo_url ? `background-image:url('${API_BASE_URL}${s.photo_url}')` : ""}"></div>
            <p class="sponsor-name">${escapeHtml(s.name || "Sponsor")}</p>
          </div>
        `).join("");
        document.querySelectorAll(".sponsor-item").forEach(el => {
          el.addEventListener("click", () => {
            const sponsorId = Number(el.getAttribute("data-id"));
            openSponsorDetail(sponsorsById[sponsorId]);
          });
        });

        // Marquee sponsor melayang (bisa diaktif/nonaktifkan admin lewat /settings).
        // Daftar sponsor digandakan 2x supaya animasi geser-kiri terlihat menyambung
        // tanpa jeda (teknik infinite marquee loop).
        if (floatingSponsorEnabled) {
          const itemsHtml = sponsors.map(s => `
            <div class="marquee-item" data-id="${s.id}">
              <div class="marquee-photo" style="${s.photo_url ? `background-image:url('${API_BASE_URL}${s.photo_url}')` : ""}"></div>
              <p class="marquee-name">${escapeHtml(s.name || "Sponsor")}</p>
            </div>
          `).join("");
          marqueeTrack.innerHTML = itemsHtml + itemsHtml;
          floatingSponsorMarquee.style.display = "block";
          marqueeTrack.querySelectorAll(".marquee-item").forEach(el => {
            el.addEventListener("click", () => {
              const sponsorId = Number(el.getAttribute("data-id"));
              openSponsorDetail(sponsorsById[sponsorId]);
            });
          });
        }
      })
      .catch(() => {
        // Diamkan saja kalau gagal -- sponsor bersifat pelengkap, tidak boleh
        // sampai bikin seluruh halaman utama kelihatan error.
      });
  }

  // ---------- Katalog talent ----------
  const grid = document.getElementById("grid");

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  let talentsById = {};
  let sponsorsById = {};

  function renderTalents(talents) {
    talentsById = {};
    talents.forEach(t => { talentsById[t.id] = t; });

    if (!talents.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="icon">📭</div>
        Belum ada talent yang tersedia saat ini.
      </div>`;
      return;
    }
    grid.innerHTML = talents.map(t => `
      <div class="card" data-id="${t.id}">
        <div class="photo" style="${t.photo_url ? `background-image:url('${API_BASE_URL}${t.photo_url}')` : ""}">
          ${!t.photo_url ? `<div class="no-photo">✦</div>` : ""}
        </div>
        <div class="info">
          <p class="name">${escapeHtml(t.name)}</p>
          <p class="desc">${escapeHtml(t.description)}</p>
        </div>
      </div>
    `).join("");

    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        const talentId = Number(card.getAttribute("data-id"));
        openDetail(talentsById[talentId]);
      });
    });
  }

  // ---------- Modal detail (foto, deskripsi, pricelist, tombol booking) ----------
  const overlay = document.getElementById("overlay");
  const closeSheet = document.getElementById("closeSheet");
  const detailPhoto = document.getElementById("detailPhoto");
  const detailName = document.getElementById("detailName");
  const detailDesc = document.getElementById("detailDesc");
  const detailPricelist = document.getElementById("detailPricelist");
  const bookBtn = document.getElementById("bookBtn");
  const channelBtn = document.getElementById("channelBtn");

  let currentTalent = null;

  function openDetail(talent) {
    if (!talent) return;
    currentTalent = talent;

    detailName.textContent = talent.name || "";
    detailDesc.textContent = talent.description || "";
    detailPricelist.textContent = talent.pricelist && talent.pricelist.trim()
      ? talent.pricelist
      : "Belum ada pricelist.";

    if (talent.photo_url) {
      detailPhoto.style.backgroundImage = `url('${API_BASE_URL}${talent.photo_url}')`;
      detailPhoto.style.display = "";
    } else {
      detailPhoto.style.display = "none";
    }

    if (talent.portfolio_url) {
      channelBtn.href = talent.portfolio_url;
      channelBtn.style.display = "flex";
    } else {
      channelBtn.style.display = "none";
    }

    overlay.classList.add("open");
    updateBackButton();
  }

  function closeDetail() {
    overlay.classList.remove("open");
    currentTalent = null;
    updateBackButton();
  }

  closeSheet.addEventListener("click", closeDetail);
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeDetail();
  });

  // Tombol "Chat Sekarang": kirim data ke bot lalu tutup Mini App, supaya
  // sesi live chat dengan admin langsung dimulai di chat.
  bookBtn.addEventListener("click", () => {
    if (!currentTalent) return;
    if (tg) {
      tg.sendData(JSON.stringify({ action: "start_chat", talent_id: Number(currentTalent.id) }));
      tg.close();
    }
  });

  // ---------- Halaman detail sponsor (foto, nama, deskripsi, tombol kunjungi) ----------
  const sponsorOverlay = document.getElementById("sponsorOverlay");
  const closeSponsorSheet = document.getElementById("closeSponsorSheet");
  const sponsorDetailPhoto = document.getElementById("sponsorDetailPhoto");
  const sponsorDetailName = document.getElementById("sponsorDetailName");
  const sponsorDetailDesc = document.getElementById("sponsorDetailDesc");
  const sponsorVisitBtn = document.getElementById("sponsorVisitBtn");

  function openSponsorDetail(sponsor) {
    if (!sponsor) return;

    sponsorDetailName.textContent = sponsor.name || "Sponsor";
    sponsorDetailDesc.textContent = sponsor.description && sponsor.description.trim()
      ? sponsor.description
      : "Belum ada deskripsi untuk sponsor ini.";

    if (sponsor.photo_url) {
      sponsorDetailPhoto.style.backgroundImage = `url('${API_BASE_URL}${sponsor.photo_url}')`;
      sponsorDetailPhoto.style.display = "";
    } else {
      sponsorDetailPhoto.style.display = "none";
    }

    if (sponsor.url) {
      sponsorVisitBtn.href = sponsor.url;
      sponsorVisitBtn.style.display = "flex";
    } else {
      sponsorVisitBtn.style.display = "none";
    }

    sponsorOverlay.classList.add("open");
    updateBackButton();
  }

  function closeSponsorDetail() {
    sponsorOverlay.classList.remove("open");
    updateBackButton();
  }

  closeSponsorSheet.addEventListener("click", closeSponsorDetail);
  sponsorOverlay.addEventListener("click", (e) => {
    if (e.target === sponsorOverlay) closeSponsorDetail();
  });

  function loadTalents() {
    talentsLoaded = true;
    fetch(`${API_BASE_URL}/api/talents`)
      .then(res => {
        if (!res.ok) throw new Error("Gagal memuat data");
        return res.json();
      })
      .then(renderTalents)
      .catch(() => {
        talentsLoaded = false;
        grid.innerHTML = `<div class="error" style="grid-column:1/-1">
          <div class="icon">⚠️</div>
          Tidak bisa memuat katalog. Pastikan API_BASE_URL di index.html sudah diisi domain yang benar.
        </div>`;
      });
  }

  loadHome();
</script>
</body>
</html>
